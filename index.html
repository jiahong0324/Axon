<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0F1E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Axon" />
    <link rel="icon" type="image/png" href="/icons/logo.png" />
    <link rel="apple-touch-icon" href="/icons/logo.png" />
    <!-- Keep one web-controlled splash layer so startup never jumps between two logo sizes. -->
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="Axon" />
    <meta property="og:description" content="Your Academic Life, Finally Organized. Axon brings your timetable, assignments, exams, and notes into one beautiful, AI-powered dashboard." />
    <meta property="og:image" content="https://axon-com.vercel.app/icons/logo.png" />
    <meta property="og:url" content="https://axon-com.vercel.app" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Axon" />
    <meta name="twitter:description" content="Your Academic Life, Finally Organized." />
    <meta name="twitter:image" content="https://axon-com.vercel.app/icons/logo.png" />
    <title>Axon</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        background-color: #0A0F1E;
      }
      html[data-theme='light'] body, html[data-theme='light'] {
        background-color: #f8fafc;
      }
      
      #prerender-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0A0F1E;
        transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s;
      }
      #prerender-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      html[data-theme='light'] #prerender-splash {
        background-color: #f8fafc;
      }
      #prerender-splash img {
        position: relative;
        z-index: 10;
        height: 7rem;
        width: 7rem;
        border-radius: 1.5rem;
        object-fit: cover;
        opacity: 1;
        filter: brightness(1.18);
        box-shadow: 0 0 58px 12px rgba(59, 130, 246, 0.7);
      }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'dark';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') document.documentElement.classList.add('dark');
            var metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (metaThemeColor) {
              metaThemeColor.setAttribute('content', theme === 'dark' ? '#0A0F1E' : '#f8fafc');
            }
          }
          var accent = localStorage.getItem('accentColor') || 'blue';
          document.documentElement.setAttribute('data-accent', accent);
        } catch (e) {}

        window.hidePrerenderSplash = function() {
          var el = document.getElementById('prerender-splash');
          if (el && !el.classList.contains('is-hidden')) {
            el.classList.add('is-hidden');
            setTimeout(function() {
              if (el && el.parentNode) el.parentNode.removeChild(el);
            }, 550);
          }
        };

        // Leave the splash in place while auth/data initialize; route components dismiss it
        // as soon as the first usable screen is ready. This is only a last-resort escape hatch.
        setTimeout(function() {
          if (window.hidePrerenderSplash) window.hidePrerenderSplash();
        }, 15000);
      })();
    </script>
    <link rel="apple-touch-icon" href="/icons/logo.png">
  </head>
  <body>
    <div id="prerender-splash">
      <img src="/icons/logo.png" alt="Axon Logo" loading="eager" fetchpriority="high" decoding="sync" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
