    <style>
      body, html {
        margin: 0;
        padding: 0;
        background-color: #0A0F1E;
      }
      html[data-theme='light'] body, html[data-theme='light'] {
        background-color: #f8fafc;
      }
      
      #prerender-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0A0F1E;
        transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s;
      }
      #prerender-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      html[data-theme='light'] #prerender-splash {
        background-color: #f8fafc;
      }
      #prerender-splash img {
        position: relative;
        z-index: 10;
        height: 7rem;
        width: 7rem;
        border-radius: 1.5rem;
        object-fit: cover;
        opacity: 0.75;
        filter: brightness(0.88);
        box-shadow: 0 0 35px 5px rgba(59, 130, 246, 0.4);
        animation: prerender-pulse 2.2s ease-in-out infinite;
      }
      @keyframes prerender-pulse {
        0%, 100% {
          opacity: 0.75;
          filter: brightness(0.88);
          box-shadow: 0 0 35px 5px rgba(59, 130, 246, 0.4);
        }
        50% {
          opacity: 1;
          filter: brightness(1.18);
          box-shadow: 0 0 58px 12px rgba(59, 130, 246, 0.7);
        }
      }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'dark';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') document.documentElement.classList.add('dark');
            var metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (metaThemeColor) {
              metaThemeColor.setAttribute('content', theme === 'dark' ? '#0A0F1E' : '#f8fafc');
            }
          }
          var accent = localStorage.getItem('accentColor') || 'blue';
          document.documentElement.setAttribute('data-accent', accent);
        } catch (e) {}

        window.hidePrerenderSplash = function() {
          var el = document.getElementById('prerender-splash');
          if (el && !el.classList.contains('is-hidden')) {
            el.classList.add('is-hidden');
            setTimeout(function() {
              if (el && el.parentNode) el.parentNode.removeChild(el);
            }, 550);
          }
        };

        setTimeout(function() {
          if (window.hidePrerenderSplash) window.hidePrerenderSplash();
        }, 3500);
      })();
    </script>
    <link rel="apple-touch-icon" href="/icons/logo.png">

  <body>
    <div id="prerender-splash">
