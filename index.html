<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#3B82F6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Axon" />
    <link rel="icon" type="image/png" href="/icons/logo.png" />
    <link rel="apple-touch-icon" href="/icons/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="Axon" />
    <meta property="og:description" content="Your Academic Life, Finally Organized. Axon brings your timetable, assignments, exams, and notes into one beautiful, AI-powered dashboard." />

    <meta name="twitter:image" content="https://axon-com.vercel.app/icons/logo.png" />
    <title>Axon</title>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('axon-theme');
          var theme = stored ? JSON.parse(stored) : 'system';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
